name: 🧪 Test and 🚀 Release

on:
  push:
    branches:
      - main
      - beta
  pull_request: {}
  workflow_dispatch: {}

jobs:
  test-and-release:
    runs-on: ubuntu-latest
    if: ${{ !contains(github.event.head_commit.message, '[skip ci]') }}

    concurrency:
      group: ${{ github.workflow }}-${{ github.ref }}
      cancel-in-progress: true

    permissions:
      # Necessary for semantic-release
      contents: write
      issues: write
      pull-requests: write
      # Necessary for npm publish --provenance
      # See https://docs.npmjs.com/generating-provenance-statements#example-github-actions-workflow
      id-token: write
      packages: write

    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@0c366fd6a839edf440554fa01a7085ccba70ac98 # main
        with:
          # Fetches 20 commits.
          # This is trade-off between checkout speed and ability to create an accurate CHANGELOG.md
          # See https://github.com/peerigon/template-public-package/issues/2
          fetch-depth: 20

      - name: 🟢 Setup Node.js
        uses: actions/setup-node@efcb663fc60e97218a2b2d6d827f7830f164739e # main
        with:
          node-version-file: ".tool-versions"
          cache: "npm"

      - name: 🗄 Cache node_modules
        id: cache-node_modules
        uses: actions/cache@b7e8d49f17405cc70c1c120101943203c98d3a4b # main
        with:
          path: "**/node_modules"
          key: node_modules-${{ runner.os }}-${{ hashFiles('**/package-lock.json') }}

      - name: 🗄 Cache .eslintcache
        uses: actions/cache@b7e8d49f17405cc70c1c120101943203c98d3a4b # main
        with:
          path: .eslintcache
          key: eslintcache-${{ runner.os }}-${{ hashFiles('**/package-lock.json') }}

      - name: 🔍 Install dependencies
        if: steps.cache-node_modules.outputs.cache-hit != 'true'
        run: |
          npm ci --ignore-scripts --prefer-offline --no-audit

      - name: 📦 Build
        run: |
          npm run build
      - name: 🧪 Run tests
        env:
          CI: true
        run: |
          npm test

      - name: 🚀 Release preview
        if: ${{ github.ref != 'refs/heads/main' && github.ref != 'refs/heads/beta' }}
        # Call to npm publish --dry-run is currently necessary, see https://github.com/stackblitz-labs/pkg.pr.new/issues/320
        run: |
          npm publish --dry-run --tag test-release
          npx pkg-pr-new publish

      - name: 🚀 Release on npm and jsr
        if: ${{ github.ref == 'refs/heads/main' || github.ref == 'refs/heads/beta' }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          npm run release
