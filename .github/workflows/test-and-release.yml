name: 🧪 Test and 🚀 Release

on:
  push:
    branches:
      - main
      - beta
  pull_request: {}
  workflow_dispatch: {}

jobs:
  test-and-release:
    runs-on: ubuntu-latest
    if: ${{ !contains(github.event.head_commit.message, '[skip ci]') }}

    concurrency:
      group: ${{ github.workflow }}-${{ github.ref }}
      cancel-in-progress: true

    permissions:
      # Necessary for semantic-release
      contents: write
      issues: write
      pull-requests: write
      # Necessary for npm publish --provenance
      # See https://docs.npmjs.com/generating-provenance-statements#example-github-actions-workflow
      id-token: write
      packages: write

    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@b9e0990d219a03df7633c93f6f005a8fecbcab22 # main

      - name: 🟢 Setup Node.js
        uses: actions/setup-node@6a61c0375d66246de94630495909f12cf8dac84d # main
        with:
          node-version-file: "package.json"
          cache: "npm"

      - name: 🗄 Cache node_modules
        id: cache-node_modules
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # main
        with:
          path: "**/node_modules"
          key: node_modules-${{ runner.os }}-${{ hashFiles('**/package-lock.json') }}

      - name: 🗄 Cache .eslintcache
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # main
        with:
          path: .eslintcache
          key: eslintcache-${{ runner.os }}-${{ hashFiles('**/package-lock.json') }}

      - name: 🔍 Install dependencies
        if: steps.cache-node_modules.outputs.cache-hit != 'true'
        run: |
          npm ci --ignore-scripts --prefer-offline --no-audit

      - name: 📦 Build
        run: |
          npm run build
      - name: 🧪 Run tests
        env:
          CI: true
        run: |
          npm test

      - name: 🚀 Release preview
        if: ${{ github.ref != 'refs/heads/main' && github.ref != 'refs/heads/beta' }}
        # Call to npm publish --dry-run is currently necessary, see https://github.com/stackblitz-labs/pkg.pr.new/issues/320
        run: |
          npm publish --dry-run --tag test-release
          npx pkg-pr-new publish

      - name: 🦕 Setup Deno
        if: ${{ github.ref == 'refs/heads/main' || github.ref == 'refs/heads/beta' }}
        uses: denoland/setup-deno@ff4860f9d7236f320afa0f82b7e6457384805d05 # main
        with:
          deno-version-file: ".dvmrc"

      - name: 🚀 Release on npm and jsr
        if: ${{ github.ref == 'refs/heads/main' || github.ref == 'refs/heads/beta' }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Make @sebbo2002/semantic-release-jsr use the Deno binary set up above
          # instead of the version bundled with the jsr npm package.
          DENO_BIN_PATH: deno
          # Optional escape hatch for legacy repos with an existing CHANGELOG.md.
          # SEMANTIC_RELEASE_ALLOW_CHANGELOG: "true"
        # Fetch the last 30 commits to ensure semantic-release has a sufficient history
        # See https://github.com/peerigon/template-public-package/issues/2
        run: |
          git fetch --depth=30
          npm run release
